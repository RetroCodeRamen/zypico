; ZyPico firmware for the Heltec WiFi LoRa 32 V3 (ESP32-S3 + SX1262).
; The board runs as a WiFi access point, serves the ZyPico web UI from flash
; (LittleFS), and bridges a WebSocket <-> the LoRa radio. See firmware/README.md.

[env:heltec_wifi_lora_32_V3]
; pioarduino fork — current Arduino-ESP32 3.x / IDF 5.x support for the S3.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
board = heltec_wifi_lora_32_V3
framework = arduino
monitor_speed = 115200

board_build.filesystem = littlefs
board_build.partitions = partitions.csv

build_flags =
    -D ZYPICO_LORA_FREQ=915.0   ; US 915 MHz — set 868.0 for EU. MUST match all boards.

lib_deps =
    jgromes/RadioLib@^7.1.2
    mathieucarbou/ESPAsyncWebServer@^3.6.0
    olikraus/U8g2@^2.35.30
    rweather/Crypto@^0.4.0   ; Ed25519 for the Station beacon signature (firmware-side)
